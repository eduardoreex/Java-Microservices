
## Porta do Servidor (Diferente da user-api!)
server.port=8081
## Configuração de conexão do PostgreSQL (O seu Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/dev
spring.datasource.username=postgres
spring.datasource.password=postgres

## Esquema do Banco de Dados para Produtos
spring.flyway.schemas=products
spring.jpa.properties.hibernate.default_schema=productszw